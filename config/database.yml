default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  url: <%= ENV.fetch("DATABASE_URL", "") %>

development:
  <<: *default
  database: table_reserve_development

test:
  <<: *default
  database: table_reserve_test

production:
  <<: *default
  database: table_reserve_production
